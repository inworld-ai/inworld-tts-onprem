suite: deployment tests
templates:
  - deployment.yaml
  - secret.yaml

tests:
  # ---------------------------------------------------------------------------
  # Image reference
  # ---------------------------------------------------------------------------
  - it: should build the correct image reference from registry/repository/tag
    set:
      config.customerId: test-customer
      image.tag: 20240301-ab12cd34
      credentials.inlineKey: '{"type":"service_account"}'
    asserts:
      - template: deployment.yaml
        equal:
          path: spec.template.spec.containers[0].image
          value: us-central1-docker.pkg.dev/inworld-ai-registry/backend/tts-1.5-mini-h100-onprem:20240301-ab12cd34

  # ---------------------------------------------------------------------------
  # INWORLD_CUSTOMER_ID env var
  # ---------------------------------------------------------------------------
  - it: should set INWORLD_CUSTOMER_ID from config.customerId
    set:
      config.customerId: onprem-metering-my-company
      image.tag: test
      credentials.inlineKey: '{"type":"service_account"}'
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: INWORLD_CUSTOMER_ID
            value: onprem-metering-my-company

  # ---------------------------------------------------------------------------
  # GPU resources
  # ---------------------------------------------------------------------------
  - it: should request and limit exactly 1 GPU
    set:
      config.customerId: test
      image.tag: test
      credentials.inlineKey: '{"type":"service_account"}'
    asserts:
      - template: deployment.yaml
        equal:
          path: spec.template.spec.containers[0].resources.limits["nvidia.com/gpu"]
          value: "1"
      - template: deployment.yaml
        equal:
          path: spec.template.spec.containers[0].resources.requests["nvidia.com/gpu"]
          value: "1"

  # ---------------------------------------------------------------------------
  # Secret created when inlineKey is set
  # ---------------------------------------------------------------------------
  - it: should create a Secret when credentials.inlineKey is set
    set:
      config.customerId: test
      image.tag: test
      credentials.inlineKey: '{"type":"service_account"}'
    asserts:
      - template: secret.yaml
        isKind:
          of: Secret

  # ---------------------------------------------------------------------------
  # Secret NOT created when existingSecret is set
  # ---------------------------------------------------------------------------
  - it: should not create a Secret when credentials.existingSecret is set
    set:
      config.customerId: test
      image.tag: test
      credentials.existingSecret: my-gcp-creds
    asserts:
      - template: secret.yaml
        hasDocuments:
          count: 0

  # ---------------------------------------------------------------------------
  # Credential volumeMount uses subPath
  # ---------------------------------------------------------------------------
  - it: should mount credentials file via subPath
    set:
      config.customerId: test
      image.tag: test
      credentials.inlineKey: '{"type":"service_account"}'
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: gcp-credentials
            mountPath: /app/gcp-credentials/.mounted-key.json
            subPath: key.json
            readOnly: true

  # ---------------------------------------------------------------------------
  # startupProbe failureThreshold
  # ---------------------------------------------------------------------------
  - it: should set startupProbe.failureThreshold to 40
    set:
      config.customerId: test
      image.tag: test
      credentials.inlineKey: '{"type":"service_account"}'
    asserts:
      - template: deployment.yaml
        equal:
          path: spec.template.spec.containers[0].startupProbe.failureThreshold
          value: 40

  # ---------------------------------------------------------------------------
  # required template: customerId empty → fail
  # ---------------------------------------------------------------------------
  - it: should fail when config.customerId is empty
    set:
      image.tag: test
      credentials.inlineKey: '{"type":"service_account"}'
    asserts:
      - template: deployment.yaml
        failedTemplate:
          errorMessage: "config.customerId is required"

  # ---------------------------------------------------------------------------
  # required template: neither credential option set → fail
  # ---------------------------------------------------------------------------
  - it: should fail when neither inlineKey nor existingSecret is set
    set:
      config.customerId: test
      image.tag: test
    asserts:
      - template: deployment.yaml
        failedTemplate:
          errorMessage: "Either credentials.inlineKey or credentials.existingSecret must be set"

  # ---------------------------------------------------------------------------
  # API key mode: inline apiKey sets INWORLD_API_KEY, INWORLD_API_ENDPOINT,
  # and INWORLD_METERING_MODE env vars
  # ---------------------------------------------------------------------------
  - it: should set INWORLD_API_KEY env var inline when config.apiKey is set
    set:
      config.customerId: test
      config.apiKey: test-api-key-value
      image.tag: test
      credentials.inlineKey: '{"type":"service_account"}'
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: INWORLD_API_KEY
            value: test-api-key-value
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: INWORLD_API_ENDPOINT
            value: https://api.inworld.ai
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: INWORLD_METERING_MODE
            value: "grpc"

  # ---------------------------------------------------------------------------
  # API key mode: custom apiEndpoint is honored
  # ---------------------------------------------------------------------------
  - it: should honor custom config.apiEndpoint when set
    set:
      config.customerId: test
      config.apiKey: test-api-key-value
      config.apiEndpoint: https://api.dev.inworld.dev
      image.tag: test
      credentials.inlineKey: '{"type":"service_account"}'
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: INWORLD_API_ENDPOINT
            value: https://api.dev.inworld.dev

  # ---------------------------------------------------------------------------
  # API key mode: apiKeySecret uses secretKeyRef (not plaintext)
  # ---------------------------------------------------------------------------
  - it: should use secretKeyRef when config.apiKeySecret.name is set
    set:
      config.customerId: test
      config.apiKeySecret.name: my-api-key-secret
      config.apiKeySecret.key: api-key
      image.tag: test
      credentials.inlineKey: '{"type":"service_account"}'
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: INWORLD_API_KEY
            valueFrom:
              secretKeyRef:
                name: my-api-key-secret
                key: api-key

  # ---------------------------------------------------------------------------
  # API key mode: apiKeySecret takes precedence over inline apiKey
  # ---------------------------------------------------------------------------
  - it: should prefer secretKeyRef over inline value when both are set
    set:
      config.customerId: test
      config.apiKey: inline-plaintext-value
      config.apiKeySecret.name: my-api-key-secret
      image.tag: test
      credentials.inlineKey: '{"type":"service_account"}'
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: INWORLD_API_KEY
            valueFrom:
              secretKeyRef:
                name: my-api-key-secret
                key: api-key
      # Ensure plaintext value is NOT present
      - template: deployment.yaml
        notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: INWORLD_API_KEY
            value: inline-plaintext-value

  # ---------------------------------------------------------------------------
  # Legacy mode: no API key env vars when config.apiKey is unset
  # ---------------------------------------------------------------------------
  - it: should not set API key env vars when config.apiKey and apiKeySecret are unset
    set:
      config.customerId: test
      image.tag: test
      credentials.inlineKey: '{"type":"service_account"}'
    asserts:
      - template: deployment.yaml
        notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: INWORLD_API_KEY
      - template: deployment.yaml
        notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: INWORLD_METERING_MODE
            value: "grpc"

---
suite: service tests
templates:
  - service.yaml

tests:
  # ---------------------------------------------------------------------------
  # Service ports
  # ---------------------------------------------------------------------------
  - it: should expose http port 8081 and grpc port 9030
    set:
      config.customerId: test
      image.tag: test
      credentials.inlineKey: '{"type":"service_account"}'
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 8081
            targetPort: http
            protocol: TCP
      - contains:
          path: spec.ports
          content:
            name: grpc
            port: 9030
            targetPort: grpc
            protocol: TCP
            appProtocol: kubernetes.io/h2c

  # ---------------------------------------------------------------------------
  # Service port overrides
  # ---------------------------------------------------------------------------
  - it: should use overridden service ports
    set:
      config.customerId: test
      image.tag: test
      credentials.inlineKey: '{"type":"service_account"}'
      service.httpPort: 8181
      service.grpcPort: 9131
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 8181
            targetPort: http
            protocol: TCP
      - contains:
          path: spec.ports
          content:
            name: grpc
            port: 9131
            targetPort: grpc
            protocol: TCP
            appProtocol: kubernetes.io/h2c

  # ---------------------------------------------------------------------------
  # Service type override
  # ---------------------------------------------------------------------------
  - it: should respect service.type override
    set:
      config.customerId: test
      image.tag: test
      credentials.inlineKey: '{"type":"service_account"}'
      service.type: LoadBalancer
    asserts:
      - equal:
          path: spec.type
          value: LoadBalancer
