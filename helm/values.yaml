nameOverride: ""
fullnameOverride: ""

image:
  registry: us-central1-docker.pkg.dev
  repository: inworld-ai-registry/backend/tts-1.5-mini-h100-onprem
  # tag is required — e.g. 20240301-ab12cd34
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 1

config:
  # --- Mode A: API key metering (recommended for new deployments) ---
  # Base64-encoded "key:secret" from Inworld Studio > Workspace > API Keys.
  # When set, metering events go via gRPC to Inworld's billing endpoint.
  apiKey: ""
  # Inworld API endpoint (default: https://api.inworld.ai)
  apiEndpoint: "https://api.inworld.ai"
  # Enable API key validation at startup (default: false)
  enableAuthValidation: false

  # --- Mode B: Customer ID + GCP SA metering (legacy) ---
  # Required for PubSub-based metering. Not needed when apiKey is set.
  customerId: ""

credentials:
  # GCP service account key — required for Mode B (legacy), optional for Mode A.
  # Option A: chart creates a Secret from the inline key JSON (use --set-file)
  inlineKey: ""
  # Option B: reference a pre-existing Secret (takes precedence over inlineKey)
  existingSecret: ""
  existingSecretKey: key.json

service:
  type: ClusterIP
  httpPort: 8081
  grpcPort: 9030

resources:
  limits:
    nvidia.com/gpu: "1"
    memory: 128Gi
    cpu: "20"
  requests:
    nvidia.com/gpu: "1"
    memory: 128Gi
    cpu: "20"

serviceAccount:
  # Set to true to create a ServiceAccount
  create: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

# Security context: runAsNonRoot disabled because entrypoint starts as root,
# chowns credential file, then drops to appuser via gosu.
podSecurityContext: {}

securityContext: {}

nodeSelector: {}

tolerations: []

affinity: {}
